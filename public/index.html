<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asana → Insightly Sync</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 1.5rem; -webkit-font-smoothing: antialiased; }
    h1 { font-size: 1.35rem; margin-bottom: 1.25rem; color: #f8fafc; }
    h1 span { color: #38bdf8; }
    .status-bar { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1.5rem; padding: 1rem; background: #1e293b; border-radius: 0.75rem; border: 1px solid #334155; flex-wrap: wrap; }
    .indicator { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .indicator.idle { background: #22c55e; }
    .indicator.running { background: #f59e0b; animation: pulse 1s infinite; }
    .indicator.error { background: #ef4444; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-text { flex: 1; font-size: 0.85rem; color: #94a3b8; min-width: 0; }
    .btn { padding: 0.45rem 0.85rem; border: none; border-radius: 0.375rem; cursor: pointer; font-size: 0.8rem; font-weight: 500; transition: background 0.2s; text-decoration: none; display: inline-block; white-space: nowrap; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { background: #475569; cursor: not-allowed; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-secondary:hover { background: #475569; }
    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 0.6rem; margin-bottom: 1.5rem; }
    .stat { background: #1e293b; padding: 0.85rem 0.5rem; border-radius: 0.6rem; text-align: center; border: 1px solid #334155; }
    .stat-value { font-size: 1.35rem; font-weight: 700; color: #f8fafc; }
    .stat-label { font-size: 0.68rem; color: #64748b; margin-top: 0.15rem; text-transform: uppercase; letter-spacing: 0.03em; }
    h2 { font-size: 1rem; margin-bottom: 0.5rem; color: #f8fafc; }
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 0.5rem; border: 1px solid #334155; background: #1e293b; }
    table { width: 100%; border-collapse: collapse; min-width: 650px; }
    th, td { text-align: left; padding: 0.6rem 0.75rem; border-bottom: 1px solid rgba(51,65,85,0.5); font-size: 0.8rem; }
    th { color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 0.68rem; letter-spacing: 0.05em; background: #1e293b; position: sticky; top: 0; }
    .badge { display: inline-block; padding: 0.12rem 0.45rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; }
    .badge-completed { background: #064e3b; color: #34d399; }
    .badge-failed { background: #450a0a; color: #fca5a5; }
    .badge-running { background: #422006; color: #fbbf24; }
    .empty { text-align: center; padding: 2.5rem 1rem; color: #475569; font-size: 0.9rem; }

    @media (max-width: 640px) {
      body { padding: 1rem; }
      h1 { font-size: 1.15rem; margin-bottom: 1rem; }
      .status-bar { padding: 0.75rem; gap: 0.5rem; }
      .status-text { font-size: 0.78rem; width: 100%; order: 2; }
      .actions { order: 3; width: 100%; }
      .actions .btn { flex: 1; text-align: center; }
      .stats { grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
      .stat { padding: 0.65rem 0.35rem; }
      .stat-value { font-size: 1.1rem; }
      .stat-label { font-size: 0.6rem; }
    }
  </style>
</head>
<body>
  <h1>Asana <span>→</span> Insightly Sync</h1>

  <div class="status-bar">
    <div id="indicator" class="indicator idle"></div>
    <div id="status-text" class="status-text">Loading...</div>
    <div class="actions">
      <a href="/report.html" class="btn btn-secondary">View Report</a>
      <button id="btn-sync" class="btn btn-primary" onclick="triggerSync(false)">Sync Now</button>
      <button id="btn-full" class="btn btn-secondary" onclick="triggerSync(true)">Full Sync</button>
    </div>
  </div>

  <div id="stats" class="stats"></div>

  <h2>Sync History</h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>Status</th>
          <th>Projects</th>
          <th>Tasks</th>
          <th>Opportunities</th>
          <th>Attorneys</th>
          <th>Firms</th>
          <th>Errors</th>
        </tr>
      </thead>
      <tbody id="history"></tbody>
    </table>
  </div>
  <div id="empty" class="empty" style="display:none;">No sync runs yet. Click "Sync Now" to start.</div>

  <script>
    async function fetchStatus() {
      const res = await fetch('/api/status');
      const data = await res.json();
      const ind = document.getElementById('indicator');
      const text = document.getElementById('status-text');

      if (data.running) {
        ind.className = 'indicator running';
        text.textContent = 'Sync in progress...';
      } else if (data.lastRun) {
        const isError = data.lastRun.status === 'failed';
        ind.className = `indicator ${isError ? 'error' : 'idle'}`;
        const time = new Date(data.lastRun.finished_at || data.lastRun.started_at).toLocaleString();
        text.textContent = `Last sync: ${time} — ${data.lastRun.status}`;
      } else {
        ind.className = 'indicator idle';
        text.textContent = 'No syncs yet';
      }

      document.getElementById('btn-sync').disabled = data.running;
      document.getElementById('btn-full').disabled = data.running;

      if (data.lastRun && data.lastRun.status !== 'running') {
        const r = data.lastRun;
        document.getElementById('stats').innerHTML = `
          <div class="stat"><div class="stat-value">${r.projects_created + r.projects_updated}</div><div class="stat-label">Projects</div></div>
          <div class="stat"><div class="stat-value">${r.tasks_created + r.tasks_updated}</div><div class="stat-label">Tasks</div></div>
          <div class="stat"><div class="stat-value">${r.opportunities_created + r.opportunities_updated}</div><div class="stat-label">Opportunities</div></div>
          <div class="stat"><div class="stat-value">${(r.contacts_created||0) + (r.contacts_updated||0)}</div><div class="stat-label">Attorneys</div></div>
          <div class="stat"><div class="stat-value">${(r.orgs_created||0) + (r.orgs_updated||0)}</div><div class="stat-label">Firms</div></div>
          <div class="stat"><div class="stat-value">${r.errors}</div><div class="stat-label">Errors</div></div>
        `;
      }
    }

    async function fetchHistory() {
      const res = await fetch('/api/history');
      const data = await res.json();
      const tbody = document.getElementById('history');
      const empty = document.getElementById('empty');

      if (!data.length) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      tbody.innerHTML = data.map(r => `
        <tr>
          <td>${new Date(r.started_at).toLocaleString()}</td>
          <td><span class="badge badge-${r.status}">${r.status}</span></td>
          <td>${r.projects_created} / ${r.projects_updated}</td>
          <td>${r.tasks_created} / ${r.tasks_updated}</td>
          <td>${r.opportunities_created} / ${r.opportunities_updated}</td>
          <td>${r.contacts_created||0} / ${r.contacts_updated||0}</td>
          <td>${r.orgs_created||0} / ${r.orgs_updated||0}</td>
          <td>${r.errors}</td>
        </tr>
      `).join('');
    }

    async function triggerSync(full) {
      const url = full ? '/sync?full=true' : '/sync';
      await fetch(url, { method: 'POST' });
      setTimeout(() => { fetchStatus(); fetchHistory(); }, 1000);
      const poll = setInterval(async () => {
        await fetchStatus();
        await fetchHistory();
        const res = await fetch('/api/status');
        const data = await res.json();
        if (!data.running) clearInterval(poll);
      }, 3000);
    }

    fetchStatus();
    fetchHistory();
    setInterval(() => { fetchStatus(); fetchHistory(); }, 30000);
  </script>
</body>
</html>
